<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<style>
		body {
			font-family: -apple-system, BlinkMacSystemFont, sans-serif;
			font-size: 9pt;
			color: #d8d8d8;
			background: #2d2d2d;
			margin: 0;
			padding: 12px;
		}
		.row { display: flex; align-items: center; margin-bottom: 10px; }
		.label { width: 84px; text-align: right; padding-right: 8px; color: #9a9a9a; }
		select { flex: 1; background: #3d3d3d; color: #d8d8d8; border: none; border-radius: 4px; padding: 4px; }
		.mods { display: flex; gap: 12px; flex: 1; }
		.mods label { display: flex; align-items: center; gap: 4px; }
		.hint { color: #7a7a7a; margin-top: 12px; line-height: 1.5; border-top: 1px solid #3d3d3d; padding-top: 10px; }
	</style>
</head>
<body>
	<div class="row">
		<div class="label">Key</div>
		<select id="key"></select>
	</div>
	<div class="row">
		<div class="label">Modifiers</div>
		<div class="mods">
			<label><input type="checkbox" id="ctrl" /> ⌃</label>
			<label><input type="checkbox" id="alt" /> ⌥</label>
			<label><input type="checkbox" id="shift" /> ⇧</label>
			<label><input type="checkbox" id="cmd" /> ⌘ / Win</label>
		</div>
	</div>
	<div class="hint">
		Held down while the key or pedal is held, released on release.
		<br /><br />
		Set your dictation app to <b>push-to-talk</b> on this same combo. A bare modifier
		with no key will not work — apps that watch modifiers can tell a synthetic one from
		a real keypress and ignore it.
	</div>

	<script>
		const KEYS = [
			"t", "f13", "f14", "f15", "f16", "f17", "f18", "f19", "space",
			"a", "b", "c", "d", "e", "f", "g", "h", "i", "j", "k", "l", "m",
			"n", "o", "p", "q", "r", "s", "u", "v", "w", "x", "y", "z",
		];
		const MODS = ["ctrl", "alt", "shift", "cmd"];
		const DEFAULTS = { key: "t", ctrl: true, alt: true, cmd: true, shift: false };

		const keyEl = document.getElementById("key");
		for (const k of KEYS) {
			const opt = document.createElement("option");
			opt.value = k;
			opt.textContent = k.toUpperCase();
			keyEl.appendChild(opt);
		}

		let websocket, uuid, settings = {};

		function save() {
			settings = {
				key: keyEl.value,
				...Object.fromEntries(MODS.map((m) => [m, document.getElementById(m).checked])),
			};
			websocket.send(JSON.stringify({
				event: "setSettings",
				context: uuid,
				payload: settings,
			}));
		}

		function render() {
			const s = { ...DEFAULTS, ...settings };
			keyEl.value = s.key;
			for (const m of MODS) document.getElementById(m).checked = !!s[m];
		}

		keyEl.addEventListener("change", save);
		for (const m of MODS) document.getElementById(m).addEventListener("change", save);

		function connectElgatoStreamDeckSocket(port, propertyInspectorUUID, registerEvent, info, actionInfo) {
			uuid = propertyInspectorUUID;
			settings = JSON.parse(actionInfo).payload.settings ?? {};
			websocket = new WebSocket("ws://127.0.0.1:" + port);

			websocket.onopen = () => {
				websocket.send(JSON.stringify({ event: registerEvent, uuid: propertyInspectorUUID }));
				render();
			};

			websocket.onmessage = (evt) => {
				const msg = JSON.parse(evt.data);
				if (msg.event === "didReceiveSettings") {
					settings = msg.payload.settings ?? {};
					render();
				}
			};
		}
	</script>
</body>
</html>
